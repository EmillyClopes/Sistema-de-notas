<!DOCTYPE html>
<html>
<head>
    <title>Editar Aluno</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn-salvar {
            flex: 2;
            padding: 12px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
        }
        .btn-salvar:hover {
            background: #38a169;
        }
        .btn-cancelar {
            flex: 1;
            padding: 12px;
            background: #a0aec0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        .btn-cancelar:hover {
            background: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Editar Aluno</h1>
        
        <form method="POST" action="/atualizar/{{id}}">
            <div class="form-group">
                <label>Nome completo:</label>
                <input type="text" name="nome" value="{{nome}}" required>
            </div>
            
            <div class="form-group">
                <label>Nota 1:</label>
                <input type="number" name="nota1" value="{{nota1}}" step="0.1" min="0" max="10" required>
            </div>
            
            <div class="form-group">
                <label>Nota 2:</label>
                <input type="number" name="nota2" value="{{nota2}}" step="0.1" min="0" max="10" required>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn-salvar">Salvar Alterações</button>
                <a href="/" class="btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
